<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />

    <!-- Primary SEO -->
    <title>GameHub - Play Free HTML5 Games Online | Mobile Friendly</title>
    <meta name="description" content="Play thousands of free HTML5 games instantly on your phone — no downloads, no installs. Action, puzzle, racing, sports & more. GameHub is your mobile arcade." />

    <meta property="og:type" content="website" />

    <meta name="twitter:description" content="Play thousands of free HTML5 games instantly — no downloads needed." />
    <meta name="twitter:image" content="https://gamehub.app/og-image.png" />

    <meta name="theme-color" content="#0a0a0f" />
    <meta name="referrer" content="no-referrer" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Structured Data -->
    <script type="application/ld+json">

      "@context": "https://schema.org",
